name: Release Please

# Watches main and maintains a rolling "Release PR" from conventional commits.
# Merging that PR bumps the version, updates CHANGELOG.md, tags vX.Y.Z, and
# publishes a GitHub Release — which in turn triggers deploy.yml.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
